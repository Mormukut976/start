<!DOCTYPE html>
<html lang="en" data-theme="slate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ CYBER COMMAND CENTER — Multi-Target Operations</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* CYBER SLATE THEME (Default: High-contrast modern tech slate, NOT pitch black) */
            --bg-base: #0b1120;
            --bg-surface: #111a2e;
            --bg-card: rgba(18, 28, 50, 0.85);
            --bg-card-hover: rgba(26, 40, 71, 0.95);
            --border-color: rgba(0, 243, 255, 0.2);
            --border-glow: #00f3ff;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --text-dim: #64748b;
            --cyan: #00f3ff;
            --neon-green: #00ff88;
            --neon-purple: #a855f7;
            --neon-orange: #ff9f1c;
            --red-alert: #ff2a6d;
            --hud-blue: #38bdf8;
            --radius-main: 10px;
            --radius-sm: 6px;
            --font-display: 'Orbitron', sans-serif;
            --font-tech: 'Rajdhani', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
            --shadow-glow: 0 0 25px rgba(0, 243, 255, 0.15);
        }

        [data-theme="light"] {
            /* CYBER LIGHT / TACTICAL DAY THEME */
            --bg-base: #f0f4f9;
            --bg-surface: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.9);
            --bg-card-hover: #ffffff;
            --border-color: rgba(14, 165, 233, 0.3);
            --border-glow: #0284c7;
            --text-main: #0f172a;
            --text-sub: #334155;
            --text-dim: #64748b;
            --cyan: #0284c7;
            --neon-green: #10b981;
            --neon-purple: #7c3aed;
            --neon-orange: #f59e0b;
            --red-alert: #e11d48;
            --hud-blue: #2563eb;
            --shadow-glow: 0 4px 20px rgba(2, 132, 199, 0.15);
        }

        [data-theme="matrix"] {
            /* MATRIX HACKER GREEN THEME */
            --bg-base: #050a05;
            --bg-surface: #0a140a;
            --bg-card: rgba(10, 25, 10, 0.9);
            --bg-card-hover: rgba(15, 35, 15, 0.95);
            --border-color: rgba(0, 255, 102, 0.3);
            --border-glow: #00ff66;
            --text-main: #00ff66;
            --text-sub: #00cc52;
            --text-dim: #008033;
            --cyan: #00ff66;
            --neon-green: #39ff14;
            --neon-purple: #00e5ff;
            --neon-orange: #ffcc00;
            --red-alert: #ff0055;
            --hud-blue: #00ff66;
            --shadow-glow: 0 0 25px rgba(0, 255, 102, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-tech);
            background: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 243, 255, 0.05) 0%, transparent 60%),
                linear-gradient(to right, rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        /* Scanlines Overlay */
        .scanlines {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            opacity: 0.4;
        }

        /* Matrix Canvas */
        #matrixCanvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.08;
            pointer-events: none;
        }

        /* ========== TOPBAR ========== */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            box-shadow: var(--shadow-glow);
            backdrop-filter: blur(10px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .cyber-logo {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, var(--cyan), var(--neon-purple));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 1.3rem;
            box-shadow: 0 0 15px var(--cyan);
            clip-path: polygon(0 0, 100% 0, 100% 80%, 80% 100%, 0 100%);
        }

        .brand-text h1 {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-text h1 span {
            color: var(--cyan);
            text-shadow: 0 0 10px var(--cyan);
        }

        .brand-tag {
            font-size: 11px;
            color: var(--text-sub);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: var(--font-code);
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .hud-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            font-family: var(--font-code);
        }
        .hud-pill.online { color: var(--neon-green); border-color: rgba(0,255,136,0.3); }
        .hud-pill.offline { color: var(--red-alert); border-color: rgba(255,42,109,0.3); }
        .hud-pill.total { color: var(--cyan); }

        .theme-switcher {
            display: flex;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 3px;
            gap: 2px;
        }

        .theme-btn {
            background: transparent;
            border: none;
            color: var(--text-sub);
            padding: 4px 10px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            font-family: var(--font-code);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .theme-btn.active {
            background: var(--cyan);
            color: #000;
            box-shadow: 0 0 10px var(--cyan);
        }

        .action-btn {
            background: linear-gradient(135deg, var(--cyan), var(--hud-blue));
            color: #000;
            border: none;
            padding: 8px 18px;
            border-radius: 6px;
            font-family: var(--font-display);
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .action-btn:hover {
            box-shadow: 0 0 20px var(--cyan);
            transform: translateY(-1px);
        }

        /* ========== MAIN CONTAINER ========== */
        .main-container {
            position: relative;
            z-index: 2;
            padding: 24px;
            max-width: 1750px;
            margin: 0 auto;
        }

        /* Controls Bar */
        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 420px;
        }

        .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--cyan);
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 40px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-main);
            font-family: var(--font-code);
            font-size: 13px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        .filter-tabs {
            display: flex;
            gap: 8px;
        }

        .tab-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-sub);
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: var(--font-tech);
            font-weight: 700;
            font-size: 13px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab-btn.active {
            background: rgba(0, 243, 255, 0.15);
            border-color: var(--cyan);
            color: var(--cyan);
        }

        /* GRID LAYOUT */
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px;
        }

        /* CARD AGENT */
        .agent-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-main);
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            backdrop-filter: blur(10px);
        }

        .agent-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            border-radius: 10px 10px 0 0;
            opacity: 0.6;
        }

        .agent-card.online::before {
            background: linear-gradient(90deg, transparent, var(--neon-green), transparent);
        }

        .agent-card.offline::before {
            background: linear-gradient(90deg, transparent, var(--red-alert), transparent);
        }

        .agent-card:hover {
            transform: translateY(-3px);
            border-color: var(--cyan);
            box-shadow: var(--shadow-glow);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .target-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .target-icon {
            width: 44px; height: 44px;
            border-radius: 10px;
            background: rgba(0, 243, 255, 0.08);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--cyan);
            position: relative;
        }

        .target-icon.online { color: var(--neon-green); border-color: rgba(0, 255, 136, 0.4); background: rgba(0, 255, 136, 0.08); }
        .target-icon.offline { color: var(--red-alert); border-color: rgba(255, 42, 109, 0.4); background: rgba(255, 42, 109, 0.08); }

        .live-dot {
            position: absolute;
            top: -2px; right: -2px;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--neon-green);
            box-shadow: 0 0 8px var(--neon-green);
            animation: pulseDot 1.5s infinite;
        }
        .live-dot.offline { background: var(--red-alert); box-shadow: none; animation: none; }

        @keyframes pulseDot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .target-name {
            font-family: var(--font-display);
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 2px;
        }

        .target-ip {
            font-size: 12px;
            color: var(--text-sub);
            font-family: var(--font-code);
        }

        .status-badge {
            font-family: var(--font-code);
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .status-badge.online { background: rgba(0, 255, 136, 0.15); color: var(--neon-green); border: 1px solid rgba(0, 255, 136, 0.3); }
        .status-badge.offline { background: rgba(255, 42, 109, 0.15); color: var(--red-alert); border: 1px solid rgba(255, 42, 109, 0.3); }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 10px;
            margin-bottom: 14px;
        }

        .metric-box {
            text-align: center;
        }

        .metric-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            font-family: var(--font-code);
            margin-bottom: 4px;
        }

        .metric-val {
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 700;
            color: var(--cyan);
        }

        .progress-bar {
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s;
        }
        .progress-fill.cpu { background: var(--cyan); }
        .progress-fill.mem { background: var(--neon-purple); }
        .progress-fill.disk { background: var(--neon-orange); }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-sub);
            font-family: var(--font-code);
        }

        .infiltrate-btn {
            color: var(--cyan);
            font-family: var(--font-display);
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
            text-transform: uppercase;
        }

        /* MODAL STYLES */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-backdrop.active { display: flex; }

        .cyber-modal {
            background: var(--bg-surface);
            border: 1px solid var(--border-glow);
            border-radius: var(--radius-main);
            width: 100%;
            max-width: 1250px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.2);
            overflow: hidden;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-head {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-card);
        }

        .modal-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .modal-title h2 {
            font-family: var(--font-display);
            font-size: 1.2rem;
            color: var(--cyan);
        }

        .close-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-sub);
            width: 34px; height: 34px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: var(--red-alert);
            color: #fff;
            border-color: var(--red-alert);
        }

        .modal-body-scroll {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }

        .modal-grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 16px;
        }

        .hud-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 16px;
        }

        .hud-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .hud-card-header h3 {
            font-family: var(--font-display);
            font-size: 12px;
            color: var(--cyan);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .full-span { grid-column: 1 / -1; }

        /* Terminal inside modal */
        .cyber-term-output {
            background: var(--bg-base);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 14px;
            font-family: var(--font-code);
            font-size: 12px;
            color: var(--neon-green);
            min-height: 120px;
            max-height: 240px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.5;
            margin-top: 10px;
        }

        .term-input-group {
            display: flex;
            gap: 8px;
        }

        .term-input-group input {
            flex: 1;
            padding: 10px 14px;
            background: var(--bg-base);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-main);
            font-family: var(--font-code);
            font-size: 13px;
        }

        .term-input-group input:focus {
            outline: none;
            border-color: var(--cyan);
        }

        .term-input-group button {
            background: var(--cyan);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-family: var(--font-display);
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
        }

        /* Preset buttons */
        .preset-cmds {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .preset-btn {
            background: rgba(0, 243, 255, 0.08);
            border: 1px solid var(--border-color);
            color: var(--text-sub);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-family: var(--font-code);
            cursor: pointer;
            transition: all 0.2s;
        }
        .preset-btn:hover { background: var(--cyan); color: #000; }

        /* Responsive */
        @media (max-width: 768px) {
            .topbar { flex-direction: column; align-items: flex-start; }
            .agents-grid { grid-template-columns: 1fr; }
            .modal-grid-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="scanlines"></div>
<canvas id="matrixCanvas"></canvas>

<!-- TOPBAR -->
<div class="topbar">
    <div class="brand">
        <div class="cyber-logo"><i class="fas fa-shield-halved"></i></div>
        <div class="brand-text">
            <h1>CYBER <span>NEXUS</span></h1>
            <div class="brand-tag">⚡ MULTI-TARGET SURVEILLANCE & COMMAND</div>
        </div>
    </div>

    <div class="topbar-actions">
        <div class="hud-pill total"><i class="fas fa-server"></i> <span id="totalCount">0</span> TARGETS</div>
        <div class="hud-pill online"><i class="fas fa-wifi"></i> <span id="onlineCount">0</span> LIVE</div>
        <div class="hud-pill offline"><i class="fas fa-circle-xmark"></i> <span id="offlineCount">0</span> DEAD</div>

        <!-- Theme Selector -->
        <div class="theme-switcher">
            <button class="theme-btn active" onclick="setTheme('slate')"><i class="fas fa-moon"></i> SLATE</button>
            <button class="theme-btn" onclick="setTheme('light')"><i class="fas fa-sun"></i> LIGHT</button>
            <button class="theme-btn" onclick="setTheme('matrix')"><i class="fas fa-terminal"></i> MATRIX</button>
        </div>

        <button class="action-btn" onclick="triggerNetworkScan()">
            <i class="fas fa-radar" id="refreshIcon"></i> SCAN NETWORK
        </button>
    </div>
</div>

<!-- MAIN -->
<div class="main-container">
    <!-- CONTROLS -->
    <div class="controls-bar">
        <div class="search-box">
            <i class="fas fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Filter targets by name, IP, OS..." oninput="filterTargets()">
        </div>

        <div class="filter-tabs">
            <button class="tab-btn active" onclick="filterTab('all', this)"><i class="fas fa-list"></i> ALL TARGETS</button>
            <button class="tab-btn" onclick="filterTab('online', this)"><i class="fas fa-bolt" style="color:var(--neon-green)"></i> LIVE ONLY</button>
            <button class="tab-btn" onclick="filterTab('offline', this)"><i class="fas fa-power-off" style="color:var(--red-alert)"></i> DEAD ONLY</button>
        </div>
    </div>

    <!-- TARGETS GRID -->
    <div class="agents-grid" id="agentsGrid"></div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-backdrop" id="modalBackdrop" onclick="if(event.target===this) closeModal()">
    <div class="cyber-modal">
        <div class="modal-head">
            <div class="modal-title">
                <i class="fas fa-terminal" style="color:var(--cyan);font-size:1.2rem;"></i>
                <h2 id="modalTargetTitle">TARGET INFILTRATION</h2>
            </div>
            <button class="close-btn" onclick="closeModal()"><i class="fas fa-xmark"></i></button>
        </div>
        <div class="modal-body-scroll" id="modalContent">
            <!-- Dynamic Content -->
        </div>
    </div>
</div>

<script>
let allMachines = [];
let filteredMachines = [];
let activeTab = 'all';
let currentDetailId = null;
let isRefreshing = false;

// THEME SWITCHER
function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.toLowerCase().includes(theme));
    });
}

// MATRIX CANVAS
const canvas = document.getElementById('matrixCanvas');
const ctx = canvas.getContext('2d');
function initMatrix() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const chars = '01ABCDEFGHIJKLMNOPQRSTUVWXYZ<>/{}[]⚡';
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function draw() {
        ctx.fillStyle = 'rgba(11, 17, 32, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00f3ff';
        ctx.font = fontSize + 'px monospace';

        for (let i = 0; i < drops.length; i++) {
            const text = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 50);
}
initMatrix();

// LOAD MACHINES
async function loadMachines() {
    try {
        const res = await fetch('/api/machines');
        allMachines = await res.json();

        const online = allMachines.filter(m => m.status === 'online').length;
        const offline = allMachines.length - online;
        document.getElementById('totalCount').textContent = allMachines.length;
        document.getElementById('onlineCount').textContent = online;
        document.getElementById('offlineCount').textContent = offline;

        filterTargets();
    } catch (e) {
        console.error('loadMachines error:', e);
    }
}

    btn.classList.add('active');

}

async function filterTargets() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    filteredMachines = allMachines.filter(m => {
        const matchTab = activeTab === 'all' || m.status === activeTab;
        const matchSearch = (m.hostname || '').toLowerCase().includes(search) || 
                            (m.ip || '').toLowerCase().includes(search) || 
                            (m.id || '').toLowerCase().includes(search);
        return matchTab && matchSearch;
    });

    const grid = document.getElementById('agentsGrid');
    if (filteredMachines.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-sub);">

function execPreset(cmd) {
    document.getElementById('cmdInput').value = cmd;
    runRemoteCmd();
}

async function runRemoteCmd() {
    if (!currentDetailId) return;
    const input = document.getElementById('cmdInput');
    const output = document.getElementById('cmdOutput');
    const cmd = input.value.trim();
    if (!cmd) return;

    output.textContent = `SYSTEM@TARGET:~$ ${cmd}\n[*] Dispatching command payload to target agent...`;
    input.value = '';

    try {
        const res = await fetch(`/api/machine/${currentDetailId}/command`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ command: cmd })
        });
        const data = await res.json();
        
        if (!data.success) {
            output.textContent = `SYSTEM@TARGET:~$ ${cmd}\n[×] Error: ${data.error || 'Failed'}`;
            return;
        }

        const cmdId = data.command_id;
        output.textContent = `SYSTEM@TARGET:~$ ${cmd}\n[+] Payload delivered. Executing on target agent...`;

        let polls = 0;
        const pollStatus = async () => {
            polls++;
            output.textContent = `SYSTEM@TARGET:~$ ${cmd}\n[+] Executing on target agent... (${polls}s)`;
            
            try {
                const sRes = await fetch(`/api/machine/${currentDetailId}/command/status/${cmdId}`);
                const sData = await sRes.json();
                
                if (sData.ready) {
                    const r = sData.result;
                    if (r.success) {
                        output.textContent = `SYSTEM@TARGET:~$ ${cmd}\n\n${r.output || '[Command executed with no output]'}`;
                    } else {
                        output.textContent = `SYSTEM@TARGET:~$ ${cmd}\n\n[×] Execution Error:\n${r.error}`;
                    }
                    return;
                }
                
                if (polls < 25) setTimeout(pollStatus, 1500);
                else output.textContent = `SYSTEM@TARGET:~$ ${cmd}\n\n[!] Timed out waiting for response`;
            } catch (err) {
                output.textContent = `SYSTEM@TARGET:~$ ${cmd}\n\n[×] Network poll failed`;
            }
        };
        setTimeout(pollStatus, 1500);

    } catch (e) {
        output.textContent = `SYSTEM@TARGET:~$ ${cmd}\n\n[×] Request failed: ${e.message}`;
    }
}
