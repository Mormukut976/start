<!DOCTYPE html>
<html lang="en" data-theme="slate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ CYBER AGENT — Local Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* CYBER SLATE THEME */
            --bg-base: #0b1120;
            --bg-surface: #111a2e;
            --bg-card: rgba(18, 28, 50, 0.85);
            --border-color: rgba(0, 243, 255, 0.2);
            --border-glow: #00f3ff;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --text-dim: #64748b;
            --cyan: #00f3ff;
            --neon-green: #00ff88;
            --neon-purple: #a855f7;
            --neon-orange: #ff9f1c;
            --red-alert: #ff2a6d;
            --radius-main: 10px;
            --radius-sm: 6px;
            --font-display: 'Orbitron', sans-serif;
            --font-tech: 'Rajdhani', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
            --shadow-glow: 0 0 25px rgba(0, 243, 255, 0.15);
        }

        [data-theme="light"] {
            --bg-base: #f0f4f9;
            --bg-surface: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.9);
            --border-color: rgba(14, 165, 233, 0.3);
            --border-glow: #0284c7;
            --text-main: #0f172a;
            --text-sub: #334155;
            --text-dim: #64748b;
            --cyan: #0284c7;
            --neon-green: #10b981;
            --neon-purple: #7c3aed;
            --neon-orange: #f59e0b;
            --shadow-glow: 0 4px 20px rgba(2, 132, 199, 0.15);
        }

        [data-theme="matrix"] {
            --bg-base: #050a05;
            --bg-surface: #0a140a;
            --bg-card: rgba(10, 25, 10, 0.9);
            --border-color: rgba(0, 255, 102, 0.3);
            --border-glow: #00ff66;
            --text-main: #00ff66;
            --text-sub: #00cc52;
            --text-dim: #008033;
            --cyan: #00ff66;
            --neon-green: #39ff14;
            --neon-purple: #00e5ff;
            --neon-orange: #ffcc00;
            --shadow-glow: 0 0 25px rgba(0, 255, 102, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-tech);
            background: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 243, 255, 0.05) 0%, transparent 60%),
                linear-gradient(to right, rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        .topbar {
            position: sticky; top: 0; z-index: 100;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 24px;
            display: flex; align-items: center; justify-content: space-between; gap: 16px;
            box-shadow: var(--shadow-glow);
            backdrop-filter: blur(10px);
        }

        .brand { display: flex; align-items: center; gap: 12px; }
        .brand-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--cyan), var(--neon-purple));
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #000; font-size: 1.2rem;
            box-shadow: 0 0 15px var(--cyan);
        }

        .brand h1 {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-main);
        }
        .brand h1 span { color: var(--cyan); }

        .theme-switcher {
            display: flex;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px; padding: 3px; gap: 2px;
        }

        .theme-btn {
            background: transparent; border: none;
            color: var(--text-sub); padding: 4px 10px;
            border-radius: 14px; cursor: pointer;
            font-size: 11px; font-weight: 700;
            font-family: var(--font-code); transition: all 0.2s;
        }
        .theme-btn.active { background: var(--cyan); color: #000; }

        .refresh-btn {
            background: linear-gradient(135deg, var(--cyan), var(--neon-green));
            color: #000; border: none; padding: 8px 16px;
            border-radius: 6px; font-family: var(--font-display);
            font-size: 11px; font-weight: 800; cursor: pointer;
        }

        .main-content {
            padding: 24px; max-width: 1650px; margin: 0 auto;
        }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px; margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: var(--radius-sm); padding: 14px 18px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 11px; color: var(--text-dim); text-transform: uppercase;
            font-family: var(--font-code); margin-bottom: 4px;
        }

        .stat-val {
            font-family: var(--font-display); font-size: 1.5rem; font-weight: 800; color: var(--cyan);
        }

        .bar-wrap { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 6px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.5s; }

        .cards-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px;
        }

        .card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: var(--radius-main); overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .card-head {
            padding: 14px 18px; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between;
            background: var(--bg-surface);
        }

        .card-head h3 {
            font-family: var(--font-display); font-size: 12px; color: var(--cyan);
            display: flex; align-items: center; gap: 8px; letter-spacing: 1px; text-transform: uppercase;
        }

        .card-body { padding: 18px; max-height: 320px; overflow-y: auto; }
        .full-span { grid-column: 1 / -1; }

        /* Remote Terminal */
        .term-input {
            width: 100%; padding: 10px 14px; background: var(--bg-base);
            border: 1px solid var(--border-color); border-radius: var(--radius-sm);
            color: var(--text-main); font-family: var(--font-code); font-size: 13px;
        }
        .term-input:focus { outline: none; border-color: var(--cyan); }
        .term-out {
            background: var(--bg-base); border: 1px solid var(--border-color);
            border-radius: var(--radius-sm); padding: 12px; margin-top: 10px;
            font-family: var(--font-code); font-size: 12px; color: var(--neon-green);
            min-height: 80px; max-height: 200px; overflow-y: auto; white-space: pre-wrap;
        }

        .preset-cmds { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .preset-btn {
            background: rgba(0, 243, 255, 0.08); border: 1px solid var(--border-color);
            color: var(--text-sub); padding: 4px 10px; border-radius: 4px;
            font-size: 11px; font-family: var(--font-code); cursor: pointer;
        }
        .preset-btn:hover { background: var(--cyan); color: #000; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="brand">
        <div class="brand-icon"><i class="fas fa-desktop"></i></div>
        <div>
            <h1>CYBER <span>AGENT</span></h1>
            <div style="font-size:10px;color:var(--text-sub);font-family:var(--font-code);">LOCAL AGENT HUD v3.5</div>
        </div>
    </div>

    <div style="display:flex;align-items:center;gap:12px;">
        <div class="theme-switcher">
            <button class="theme-btn active" onclick="setTheme('slate')">SLATE</button>
            <button class="theme-btn" onclick="setTheme('light')">LIGHT</button>
            <button class="theme-btn" onclick="setTheme('matrix')">MATRIX</button>
        </div>
        <button class="refresh-btn" onclick="loadAll()"><i class="fas fa-rotate"></i> REFRESH</button>
    </div>
</div>

<div class="main-content">
    <!-- STATS -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">CPU Usage</div>
            <div class="stat-val" id="cpuVal">--%</div>
            <div class="bar-wrap"><div class="bar-fill" id="cpuBar" style="background:var(--cyan);width:0%"></div></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">RAM Usage</div>
            <div class="stat-val" id="memVal" style="color:var(--neon-purple)">--%</div>
            <div class="bar-wrap"><div class="bar-fill" id="memBar" style="background:var(--neon-purple);width:0%"></div></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Disk Usage</div>
            <div class="stat-val" id="diskVal" style="color:var(--neon-orange)">--%</div>
            <div class="bar-wrap"><div class="bar-fill" id="diskBar" style="background:var(--neon-orange);width:0%"></div></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Uptime</div>
            <div class="stat-val" id="uptimeVal" style="font-size:1.2rem;color:var(--neon-green)">--</div>
            <div style="font-size:11px;color:var(--text-sub);" id="osVal">--</div>
        </div>
    </div>

    <div class="cards-grid">
        <!-- Live Screenshot -->
        <div class="card full-span">
            <div class="card-head">
                <h3><i class="fas fa-video"></i> Live Screen Capture</h3>
                <button class="preset-btn" onclick="refreshSS()"><i class="fas fa-rotate"></i> Refresh</button>
            </div>
            <div class="card-body" style="max-height:none;text-align:center;background:#000;">
                <img id="ssImg" src="/api/screenshot" style="width:100%;max-height:450px;object-fit:contain;display:block;" onerror="this.parentElement.innerHTML='<div style=\\'padding:30px;color:var(--text-sub);\\'>Screenshot unavailable</div>'">
            </div>
        </div>

        <!-- Active Window -->
        <div class="card">
            <div class="card-head"><h3><i class="fas fa-window-restore"></i> Active Window</h3></div>
            <div class="card-body">
                <div id="activeWin" style="font-family:var(--font-display);font-size:1.4rem;color:var(--cyan);font-weight:700;">--</div>
            </div>
        </div>

        <!-- Terminal -->
        <div class="card">
            <div class="card-head"><h3><i class="fas fa-terminal"></i> Terminal Shell</h3></div>
            <div class="card-body" style="max-height:none;">
                <div style="display:flex;gap:6px;">
                    <input type="text" class="term-input" id="cmdIn" placeholder="Type command... e.g. ls ~/Desktop" onkeypress="if(event.key==='Enter') runCmd()">
                    <button class="refresh-btn" onclick="runCmd()">EXEC</button>
                </div>
                <div class="preset-cmds">
                    <button class="preset-btn" onclick="setCmd('ls ~/Desktop')">Desktop</button>
                    <button class="preset-btn" onclick="setCmd('ls ~/Downloads')">Downloads</button>
                    <button class="preset-btn" onclick="setCmd('open -a \\'Microsoft Teams\\'')">Teams</button>
                    <button class="preset-btn" onclick="setCmd('open \\'https://www.youtube.com\\'')">YouTube</button>
                </div>
                <div class="term-out" id="cmdOut">$ Ready...</div>
            </div>
        </div>

        <!-- Browser History -->
        <div class="card">
            <div class="card-head"><h3><i class="fas fa-globe"></i> Browser History</h3></div>
            <div class="card-body" id="histList" style="font-family:var(--font-code);font-size:12px;">Loading...</div>
        </div>

        <!-- Processes -->
        <div class="card">
            <div class="card-head"><h3><i class="fas fa-microchip"></i> Running Processes</h3></div>
            <div class="card-body" id="procList" style="font-family:var(--font-code);font-size:12px;">Loading...</div>
        </div>
    </div>
</div>

<script>
function setTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().includes(t)));
}

function refreshSS() {
    document.getElementById('ssImg').src = `/api/screenshot?t=${Date.now()}`;
}

function setCmd(c) {
    document.getElementById('cmdIn').value = c;
    runCmd();
}

async function runCmd() {
    const input = document.getElementById('cmdIn');
    const out = document.getElementById('cmdOut');
    const cmd = input.value.trim();
    if (!cmd) return;

    out.textContent = `$ ${cmd}\n[*] Executing...`;
    input.value = '';

    try {
        const res = await fetch('/api/command', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({command: cmd})
        });
        const data = await res.json();
        out.textContent = `$ ${cmd}\n\n${data.output || data.error || 'Done'}`;
    } catch(e) {
        out.textContent = `$ ${cmd}\n\n[×] Error: ${e.message}`;
    }
}

async function loadAll() {
    try {
        const info = await fetch('/api/info').then(r => r.json());
        document.getElementById('cpuVal').textContent = (info.cpu_percent || 0) + '%';
        document.getElementById('cpuBar').style.width = (info.cpu_percent || 0) + '%';
        document.getElementById('memVal').textContent = (info.memory_percent || 0) + '%';
        document.getElementById('memBar').style.width = (info.memory_percent || 0) + '%';
        document.getElementById('diskVal').textContent = (info.disk_percent || 0) + '%';
        document.getElementById('diskBar').style.width = (info.disk_percent || 0) + '%';
        document.getElementById('uptimeVal').textContent = info.uptime || '--';
        document.getElementById('osVal').textContent = info.os || '--';

        const win = await fetch('/api/active_window').then(r => r.json());
        document.getElementById('activeWin').textContent = win.active || 'Desktop';

        const hist = await fetch('/api/history').then(r => r.json());
        document.getElementById('histList').innerHTML = hist.length ? hist.slice(0, 20).map(h => 
            `<div style="padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.05);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                <span style="color:var(--cyan);font-weight:700;">[${h.browser || 'Web'}]</span> ${h.title || h.url}
            </div>`
        ).join('') : 'No history';

        const procs = await fetch('/api/processes').then(r => r.json());
        document.getElementById('procList').innerHTML = procs.length ? procs.slice(0, 15).map(p => 
            `<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
                <span>${p.name}</span>
                <span style="color:var(--cyan)">CPU ${p.cpu}%</span>
            </div>`
        ).join('') : 'No process data';

    } catch(e) { console.error(e); }
}

loadAll();
setInterval(loadAll, 10000);
</script>
</body>
</html>
